name: Scala CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Bump thread stack to dodge StackOverflow in the Scala.js
  # PrepJSInterop tree traversal on deeply-nested code.
  JAVA_OPTS: -Xss256m -Dfile.encoding=UTF-8

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt -v "scalafmtCheckAll; test"
